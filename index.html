<!DOCTYPE html>
<html>
<title>Ashwant Manikoth</title>
<style>

.wrapper {
   background-image: url('/2.jpg');
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
   
}

.profile {
    position: relative;
    width: 300px;
    height: 350px;
    background: url("/1.jpg");
    background-size: cover;
    cursor: pointer;
    border: 12px;
    border-top-right-radius: 35px !important;
    border-radius: 6px
}

.overlay {
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.8);
    border-radius: 12px;
    cursor: pointer;
    opacity: 0;
    transition: all 1s;
    border-top-right-radius: 35px !important;
    border-radius: 6px
}

.profile:hover .overlay {
    opacity: 1
}

.social-icons {
    display: flex;
    list-style: none;
    bottom: 10px;
    position: absolute;
    text-align: center;
    justify-content: center;
    left: 22px
}

.social-icons li {
    width: 25px;
    height: 25px;
    border: 1px solid #eee;
    padding: 20px;
    margin-right: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #fff;
    border-radius: 5px;
    transition: all 1s
}

.social-icons li:hover {
    background: #fff;
    color: #000
}

.overlay .about {
    position: relative;
    justify-content: center;
    align-items: center;
    display: flex;
    top: 40%;
    color: #fff;
    flex: column
}

</style>

<script type="text/javascript" src="javascript.js"></script>
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-alpha1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
                                                                                               
<body>
 <link rel="icon" href="/star_favicon.png">
 <div class="wrapper">
    <div class="profile">
        <div class="overlay">
            <div class="about d-flex flex-column">
                <h4>Ashwant Manikoth</h4> <span>Software Engineer</span>
            </div>
            <ul class="social-icons">
                <li><a href="https://stackoverflow.com/users/6844163/ashwant-manikoth?tab=badges"> <i class="fa fa-stack-overflow" aria-hidden="true"></i></a></li>
                <li><a href="https://www.linkedin.com/in/ashwant-manikoth/"><i class="fa fa-linkedin" aria-hidden="true" </i></a></li>             
            </ul>
        </div>
    </div>
</div>
</body>
</html>
